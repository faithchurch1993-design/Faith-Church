<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Church Events</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f5f5;
        }

        /* Header */
        .header {
            background: #1e3a5f;
            color: white;
            text-align: center;
            padding: 40px;
        }

        .header h1 {
            margin: 0;
        }

        /* Container */
        .container {
            padding: 40px;
        }

        /* Event Cards */
        .event-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .event-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
        }

        .event-card:hover {
            transform: translateY(-10px);
        }

        /* Image */
        .event-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        /* Content */
        .event-content {
            padding: 20px;
        }

        .event-content h3 {
            color: #1e3a5f;
        }

        .event-content p {
            color: gray;
        }

        /* Buttons */
        .event-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 15px;
            background: #1e3a5f;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        /* Back Button */
        .back-btn {
            display: block;
            width: 200px;
            margin: 50px auto;
            padding: 12px;
            background: #1e3a5f;
            color: white;
            text-decoration: none;
            text-align: center;
            border-radius: 8px;
        }
    </style>

</head>

<body>

    <div class="header">
        <h1>Church Events</h1>
        <p>Upcoming Church Events</p>
    </div>

    <div class="container">

        <div class="event-container">

            <!-- Event 1 -->
            <div class="event-card">
                <img src="images/conference.jpeg" alt="Coference/Fellowship">
                <div class="event-content">
                    <h3>Coference/Fellowship</h3>
                    <p>Date: April 10, 2026</p>
                    <p>Location: Site</p>
                    <a href="images/conference.jpeg" class="event-btn">View Details</a>
                </div>
            </div>

            <!-- Event 2 -->
            <div class="event-card">
                <img src="images/anniversary.jpg" alt="Church Anniversary">
                <div class="event-content">
                    <h3>Church Anniversary</h3>
                    <p>Date: May 5, 2026</p>
                    <p>Location: San Narciso Church</p>
                    <a href="images/anniversary.jpg" class="event-btn">View Details</a>
                </div>
            </div>

            <!-- Event 3 -->
            <div class="event-card">
                <img src="images/YOUTH.JPG" alt="Youth Camp">
                <div class="event-content">
                    <h3>Youth Camp</h3>
                    <p>Date: June 15, 2026</p>
                    <p>Location: Urdaneta Church</p>
                    <a href="images/YOUTH.JPG" class="event-btn">View Details</a>
                </div>
            </div>

        </div>

    </div>

    <a href="index.html" class="back-btn">Back to Home</a>

</body>

</html>
