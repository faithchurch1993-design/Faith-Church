<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Church Gallery</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f5f5;
        }

        /* Header */
        .header {
            background: #1e3a5f;
            color: white;
            text-align: center;
            padding: 40px;
        }

        .header h1 {
            margin: 0;
        }

        /* Church Section */
        .church {
            padding: 40px;
        }

        .church h2 {
            text-align: center;
            color: #1e3a5f;
            margin-bottom: 30px;
        }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        /* Image */
        .gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            transition: 0.3s;
            cursor: pointer;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        /* Back Button */
        .back-btn {
            display: block;
            width: 200px;
            margin: 50px auto;
            padding: 12px;
            background: #1e3a5f;
            color: white;
            text-decoration: none;
            text-align: center;
            border-radius: 8px;
        }

        .back-btn:hover {
            background: #2c5282;
        }
    </style>

</head>

<body>

    <div class="header">
        <h1>Church Gallery</h1>
        <p>Photos from Our Churches</p>
    </div>

    <!-- Church 1 -->
    <div class="church">
        <h2>San Narciso Main Church</h2>
        <div class="gallery">
            <img src="images/SANNARCISO 1.jpg" alt="San Narciso Main Church 1">
            <img src="images/SANNARCISO 2.jpg" alt="San Narciso Main Church 2">
            <img src="images/SANNARCISO  3.jpg" alt="San Narciso Main Church 3">
            <img src="images/SANNARCISO 4.jpg" alt="San Narciso Main Church 4">
        </div>
    </div>

    <!-- Church 2 -->
    <div class="church">
        <h2>Urdaneta Church</h2>
        <div class="gallery">
            <img src="images/URDANETA PIC 1.jpg" alt="Urdaneta Church 1">
            <img src="images/URDANETA PIC 2.jpg" alt="Urdaneta Church 2">
            <img src="images/URDANETA PIC 3.jpg" alt="Urdaneta Church 3">
            <img src="images/URDANETA PIC 4.jpg" alt="Urdaneta Church 4">
        </div>
    </div>

    <!-- Church 3 -->
    <div class="church">
        <h2>Sablayan Church</h2>
        <div class="gallery">
            <img src="images/" alt="Sablayan Church 1">
            <img src="images/" alt="Sablayan Church 2">
            <img src="images/" alt="Sablayan Church 3">
            <img src="images/" alt="Sablayan Church 4">
        </div>
    </div>

    <a href="index.html" class="back-btn">Back to Home</a>

</body>

</html>
